{{ range .Pages.GroupByDate "Jan 2006" }}
<h4>{{ .Key }}</h4>
<ol class="photo-list">
    {{ range .Pages }}
    {{ $firstImage := index (.Resources.ByType "image") 0 }}
    {{ $firstImage = $firstImage.Fit "480x480" }}
    <li>
        <a href="{{ .RelPermalink }}" title="{{ .Title }}">
            <img src="{{ $firstImage.RelPermalink }}" alt="{{ .Description }}">
        </a>
    </li>
    {{ end }}
    <li></li>
</ol>
{{ end }}
